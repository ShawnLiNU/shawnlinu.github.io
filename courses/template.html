<!DOCTYPE html>
<html lang="en">
<head>

<style>
/* ── THEMES ──────────────────────────────────────── */
:root{--title-color:#2c3e50;--subtitle-color:#5a6c7d;--body-text:#333;--accent:#34495e;--bar-color:#34495e;--tag-bg:#ecf0f1;--tag-text:#34495e;--box-bg:#f8f9fa;--box-border:#dee2e6;--callout-bg:#f0f3f5;--callout-border:#34495e}
[data-theme="steel-blue"]{--title-color:#1a3a5c;--subtitle-color:#5b7fa5;--body-text:#2c3e50;--accent:#2980b9;--bar-color:#2980b9;--tag-bg:#e8f4fd;--tag-text:#1a3a5c;--box-bg:#f0f7fd;--box-border:#aed6f1;--callout-bg:#e8f4fd;--callout-border:#2980b9}
[data-theme="warm-charcoal"]{--title-color:#1a1a2e;--subtitle-color:#666;--body-text:#2d2d2d;--accent:#c0392b;--bar-color:#c0392b;--tag-bg:#fdf2f2;--tag-text:#922b21;--box-bg:#fdfafa;--box-border:#f1948a;--callout-bg:#fdf2f2;--callout-border:#c0392b}

/* ── BASE ────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box}
.reveal{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--body-text);font-size:16px}
.reveal .slides{text-align:left}
.reveal .slides section{padding:28px 48px 36px;height:100%;overflow:hidden}
.reveal .slides section::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--bar-color);transition:background .4s}
.reveal h1,.reveal h2,.reveal h3{text-transform:none;letter-spacing:0;margin:0 0 12px;color:var(--title-color);line-height:1.2}
.reveal h1{font-size:1.5em;font-weight:300}
.reveal h2{font-size:1.05em;font-weight:600;border-bottom:2px solid var(--bar-color);padding-bottom:7px;margin-bottom:14px}
.reveal h3{font-size:.75em;font-weight:700;color:var(--accent);margin-bottom:7px}
.reveal p{font-size:.75em;line-height:1.55;color:var(--body-text);margin:0 0 8px}
.reveal code{font-size:.82em;background:var(--tag-bg);padding:1px 5px;border-radius:3px;font-family:'Consolas','Menlo',monospace}
.course-tag{display:inline-block;font-size:.52em;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--tag-text);background:var(--tag-bg);padding:3px 10px;border-radius:3px;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--bar-color);color:#fff;font-size:.65em;font-weight:700;flex-shrink:0;transition:background .4s;line-height:1}
#flash{position:fixed;bottom:44px;left:16px;z-index:9999;font-family:'Segoe UI',sans-serif;font-size:12px;font-weight:600;color:var(--bar-color);background:rgba(255,255,255,.94);padding:4px 12px;border-radius:4px;border:1px solid var(--box-border);opacity:0;transition:opacity .4s}

/* ── DARK SLIDES ─────────────────────────────────── */
.slide-dark{background:var(--title-color)!important;transition:background .4s;display:flex!important;flex-direction:column;justify-content:center!important;overflow:hidden!important}
.slide-dark::after{background:rgba(255,255,255,.22)!important}
.nu-seal{position:absolute;bottom:-60px;right:-60px;width:380px;height:380px;filter:brightness(0) invert(1);opacity:.13;pointer-events:none;user-select:none}

/* ── TITLE ───────────────────────────────────────── */
.slide-dark.is-title{padding:44px 72px!important}
.title-course-label{font-size:.65em;font-weight:400;color:rgba(255,255,255,.55);margin:0 0 2px}
.title-course-name{font-size:.75em;font-weight:600;color:rgba(255,255,255,.85);margin:0 0 36px}
.title-h1{font-size:1.75em;font-weight:300;color:#fff;margin:0 0 36px;line-height:1.25;max-width:68%}
.title-instructor-name{font-size:.72em;font-weight:600;color:#fff;margin-bottom:4px}
.title-instructor-sub{font-size:.6em;color:rgba(255,255,255,.55);line-height:1.7}

/* ── SECTION ─────────────────────────────────────── */
.slide-dark.is-section h2{color:#fff!important;font-size:1.3em!important;font-weight:300!important;border-bottom:1px solid rgba(255,255,255,.2)!important;padding-bottom:12px!important;margin-bottom:10px!important}
.section-sub{color:rgba(255,255,255,.5)!important;font-size:.7em;margin:0}
.section-number{font-size:4em;font-weight:700;color:rgba(255,255,255,.1);position:absolute;top:20px;right:48px;line-height:1}

/* ── Q&A ─────────────────────────────────────────── */
.slide-dark.is-qa h2{color:#fff!important;font-size:1.6em!important;font-weight:300!important;border-bottom:1px solid rgba(255,255,255,.2)!important;padding-bottom:12px!important;margin-bottom:10px!important}
.qa-sub{color:rgba(255,255,255,.5)!important;font-size:.58em;margin-top:28px}

/* ── PAGE NUMBER ─────────────────────────────────── */
.page-num{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:.42em;color:#bbb;letter-spacing:.5px;pointer-events:none}

/* ── BULLET LIST ─────────────────────────────────── */
.reveal ul.bullet-list{list-style:none;padding:0;margin:0}
.reveal ul.bullet-list li{font-size:.76em;padding:6px 0 6px 18px;position:relative;color:var(--body-text);border-bottom:1px solid var(--box-border);line-height:1.45}
.reveal ul.bullet-list li:last-child{border-bottom:none}
.reveal ul.bullet-list li::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--bar-color);transition:background .4s}

/* ── BOXES ───────────────────────────────────────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.col-box{background:var(--box-bg);border:1px solid var(--box-border);border-radius:5px;padding:13px 15px}
.col-box ul{list-style:none;padding:0;margin:0}
.col-box ul li{font-size:.72em;padding:4px 0 4px 16px;position:relative;color:var(--body-text);line-height:1.4}
.col-box ul li::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--bar-color);transition:background .4s}
.callout{background:var(--callout-bg);border-left:4px solid var(--callout-border);border-radius:0 5px 5px 0;padding:9px 14px;font-size:.72em;color:var(--body-text);margin-top:12px;line-height:1.5}

/* ── FLOW ────────────────────────────────────────── */
.flow-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.flow-step{background:var(--box-bg);border:1px solid var(--box-border);border-top:3px solid var(--bar-color);transition:border-color .4s;border-radius:5px;padding:12px 10px;text-align:center;flex:1}
.flow-step .step-num{width:28px;height:28px;border-radius:50%;background:var(--bar-color);color:#fff;font-size:.7em;font-weight:700;margin:0 auto 7px;display:flex;align-items:center;justify-content:center;transition:background .4s}
.flow-step .step-label{font-size:.65em;font-weight:700;color:var(--title-color)}
.flow-step .step-sub{font-size:.58em;color:var(--subtitle-color);margin-top:2px}
.flow-arrow{font-size:1em;color:var(--accent);flex-shrink:0;font-weight:700}

/* ── PIPELINE ────────────────────────────────────── */
.pipeline-row{display:flex;align-items:flex-start;gap:12px;background:var(--box-bg);border:1px solid var(--box-border);border-radius:5px;padding:9px 14px;margin-bottom:7px}
.pipe-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65em;font-weight:700;color:#fff;background:var(--bar-color);flex-shrink:0;margin-top:1px;transition:background .4s}
.pipe-name{font-size:.73em;font-weight:700;color:var(--title-color);margin-bottom:2px}
.pipe-desc{font-size:.65em;color:var(--subtitle-color);line-height:1.4}
.pipe-io{font-size:.58em;color:#999;margin-top:3px}

/* ── COMP GRID ───────────────────────────────────── */
.comp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
.comp-card{background:var(--box-bg);border:1px solid var(--box-border);border-top:3px solid var(--bar-color);border-radius:5px;padding:11px 12px;transition:border-color .4s}
.comp-label{display:inline-flex;align-items:center;justify-content:center;background:var(--bar-color);color:#fff;font-size:.55em;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-bottom:7px;transition:background .4s}
.comp-name{font-size:.67em;font-weight:700;color:var(--title-color);margin-bottom:4px}
.comp-desc{font-size:.6em;color:var(--subtitle-color);line-height:1.45}

/* ── DOF ─────────────────────────────────────────── */
.dof-row{display:flex;gap:8px;margin-bottom:12px}
.dof-card{flex:1;background:var(--box-bg);border:1px solid var(--box-border);border-top:3px solid var(--bar-color);border-radius:5px;padding:10px 8px;text-align:center;transition:border-color .4s}
.dof-joint{font-size:.65em;font-weight:600;color:var(--title-color)}
.dof-num{font-size:1.2em;font-weight:700;color:var(--bar-color);margin:3px 0;transition:color .4s}
.dof-motion{font-size:.56em;color:var(--subtitle-color);line-height:1.35}

/* ── TABLE ───────────────────────────────────────── */
.map-table{width:100%;border-collapse:collapse;font-size:.7em;margin-top:4px}
.map-table th{text-align:left;padding:7px 10px;background:var(--title-color);color:#fff;font-weight:600;font-size:.9em;transition:background .4s}
.map-table td{padding:7px 10px;border-bottom:1px solid var(--box-border);color:var(--body-text);vertical-align:top;line-height:1.4}
.map-table tr:nth-child(even) td{background:var(--box-bg)}
.map-table .col-accent{color:var(--accent);font-weight:600}

/* ── LAB ─────────────────────────────────────────── */
.lab-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:7px}
.lab-n{width:22px;height:22px;border-radius:50%;background:var(--bar-color);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.6em;font-weight:700;flex-shrink:0;transition:background .4s}
.lab-text{font-size:.72em;color:var(--body-text);padding-top:3px;line-height:1.4}

/* ── SUMMARY ─────────────────────────────────────── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sum-item{display:flex;gap:10px;align-items:flex-start;background:var(--box-bg);border:1px solid var(--box-border);border-radius:5px;padding:9px 11px;font-size:.7em;color:var(--body-text);line-height:1.45}
.resource-links{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.res-link{font-size:.62em;background:var(--tag-bg);color:var(--tag-text);border:1px solid var(--box-border);border-radius:4px;padding:4px 10px;text-decoration:none;font-weight:500}
.next-box{background:var(--callout-bg);border-left:4px solid var(--callout-border);border-radius:0 5px 5px 0;padding:8px 13px;font-size:.7em;color:var(--body-text);margin-bottom:10px}

/* ── IMAGE ───────────────────────────────────────── */
.img-wrap{width:100%;margin-top:8px;text-align:center}
.img-wrap img{max-width:100%;max-height:480px;border-radius:5px;border:1px solid var(--box-border);object-fit:contain}
.img-caption{font-size:.58em;color:var(--subtitle-color);margin-top:7px;font-style:italic}

/* ── VIDEO ───────────────────────────────────────── */
.video-wrap{position:relative;width:100%;padding-top:50%;margin-top:8px;border-radius:5px;overflow:hidden;border:1px solid var(--box-border)}
.video-wrap iframe,.video-wrap video{position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:5px}
.video-caption{font-size:.58em;color:var(--subtitle-color);margin-top:7px;font-style:italic}

/* ── AGENDA ──────────────────────────────────────── */
.agenda-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.agenda-item{display:flex;align-items:center;gap:14px;background:var(--box-bg);border:1px solid var(--box-border);border-radius:5px;padding:12px 16px}
.agenda-num{font-size:1.1em;font-weight:700;color:var(--bar-color);flex-shrink:0;min-width:32px;transition:color .4s}
.agenda-title{font-size:.72em;font-weight:600;color:var(--title-color)}
.agenda-sub{font-size:.6em;color:var(--subtitle-color);margin-top:2px;line-height:1.4}

/* ── DEFINITION ──────────────────────────────────── */
.def-term{font-size:1.3em;font-weight:700;color:var(--bar-color);margin-bottom:16px;transition:color .4s}
.def-text{font-size:.8em;line-height:1.65;color:var(--body-text);background:var(--box-bg);border:1px solid var(--box-border);border-left:5px solid var(--bar-color);border-radius:0 6px 6px 0;padding:14px 18px;margin-bottom:12px;transition:border-color .4s}
.def-source{font-size:.6em;color:var(--subtitle-color);font-style:italic}

/* ── QUOTE ───────────────────────────────────────── */
.quote-wrap{display:flex;flex-direction:column;justify-content:center;height:75%;padding:0 20px}
.quote-mark{font-size:4em;font-weight:700;color:var(--bar-color);line-height:.8;margin-bottom:8px;transition:color .4s}
.quote-text{font-size:.9em;font-weight:300;color:var(--title-color);line-height:1.65;margin-bottom:18px;font-style:italic}
.quote-author{font-size:.68em;font-weight:600;color:var(--bar-color);transition:color .4s}
.quote-role{font-size:.6em;color:var(--subtitle-color);margin-top:2px}

/* ── STATS ───────────────────────────────────────── */
.stats-row{display:flex;gap:16px;margin-top:14px}
.stat-card{flex:1;background:var(--box-bg);border:1px solid var(--box-border);border-top:4px solid var(--bar-color);border-radius:6px;padding:20px 16px;text-align:center;transition:border-color .4s}
.stat-value{font-size:1.8em;font-weight:700;color:var(--bar-color);line-height:1;margin-bottom:8px;transition:color .4s}
.stat-label{font-size:.65em;color:var(--subtitle-color);line-height:1.4}

/* ── COMPARISON ──────────────────────────────────── */
.compare-wrap{display:grid;grid-template-columns:1fr 40px 1fr;gap:0;margin-top:8px;align-items:stretch}
.compare-box{background:var(--box-bg);border:1px solid var(--box-border);border-radius:6px;padding:14px 16px}
.compare-box.right{border-color:var(--bar-color);border-width:2px}
.compare-label{font-size:.6em;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--bar-color);margin-bottom:10px;transition:color .4s}
.compare-label.muted{color:var(--subtitle-color)}
.compare-divider{display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:700;color:var(--subtitle-color)}
.compare-box ul{list-style:none;padding:0;margin:0}
.compare-box ul li{font-size:.7em;padding:4px 0 4px 16px;position:relative;color:var(--body-text);line-height:1.4}
.compare-box ul li::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--bar-color);transition:background .4s}

/* ── CODE ────────────────────────────────────────── */
.code-wrap{margin-top:8px;border-radius:6px;overflow:hidden;border:1px solid var(--box-border)}
.code-lang-bar{background:var(--title-color);color:rgba(255,255,255,.6);font-size:.55em;padding:5px 14px;font-family:'Consolas','Menlo',monospace;letter-spacing:.5px;transition:background .4s}
.code-block{background:#f6f8fa;padding:14px 16px;margin:0;overflow-x:auto;font-size:.72em;font-family:'Consolas','Menlo',monospace;color:#24292e;line-height:1.6;white-space:pre}

/* ── EQUATION (KaTeX) ────────────────────────────── */
.eq-display{background:var(--box-bg);border:1px solid var(--box-border);border-left:5px solid var(--bar-color);border-radius:0 6px 6px 0;padding:18px 24px;margin:14px 0;text-align:center;transition:border-color .4s}
/* Scale KaTeX output to match slide scale */
.eq-display .katex{font-size:1.25em}
.eq-display .katex-display{margin:0}
.eq-terms{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}
.eq-term{display:flex;gap:10px;align-items:baseline;font-size:.67em}
.eq-sym{font-weight:700;color:var(--bar-color);min-width:80px;transition:color .4s}
/* KaTeX inside sym cell */
.eq-sym .katex{font-size:1em;color:var(--bar-color)}
.eq-meaning{color:var(--subtitle-color)}

/* ── FIGURE ──────────────────────────────────────── */
.figure-wrap{display:grid;grid-template-columns:1fr auto;gap:20px;margin-top:8px;align-items:start}
.figure-img img{max-width:100%;max-height:420px;border-radius:5px;border:1px solid var(--box-border);object-fit:contain}
.figure-annotations{min-width:220px}
.fig-annotation{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;font-size:.68em;color:var(--body-text);line-height:1.4}
.fig-dot{width:8px;height:8px;border-radius:50%;background:var(--bar-color);flex-shrink:0;margin-top:4px;transition:background .4s}
.figure-caption{font-size:.58em;color:var(--subtitle-color);margin-top:7px;font-style:italic}

/* ── NAV ─────────────────────────────────────────── */
.reveal .controls{bottom:12px;right:12px}
.reveal .controls button{color:var(--bar-color)!important;opacity:.18!important;transform:scale(.55);transition:opacity .2s,transform .2s}
.reveal .controls button:hover{opacity:.55!important;transform:scale(.62)}
</style>
</head>

<div id="flash"></div>
<div class="reveal"><div class="slides" id="slide-container"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.js"></script>
<script>
/* ╔══════════════════════════════════════════════════════════════╗
   ║                    ★  SLIDE CONTENT  ★                       ║
   ║  Only edit this SLIDES array. Never touch anything below.    ║
   ╠══════════════════════════════════════════════════════════════╣
   ║  AVAILABLE TYPES:                                            ║

   ║  Or use template literals (backticks) for raw \frac, \alpha  ║
   ╚══════════════════════════════════════════════════════════════╝ */

const SLIDES = [

  /* ── TITLE ─────────────────────────────────────────────────── */
  {
    type: "title",
    courseCode:  "EECE 5552",
    courseName:  "Assistive Robotics",
    title:       "Lecture 9: Intro to Musculoskeletal\nModeling & Simulation",
    instructor:  "Dr. Xian Li",
    role:        "Assistant Teaching Professor",
    dept:        "Department of Electrical and Computer Engineering"
    // date: "03/09/2026"  ← uncomment to fix date; otherwise shows today
  },

  /* ── AGENDA ─────────────────────────────────────────────────── */
  {
    type:  "agenda",
    tag:   "Overview",
    title: "Lecture Outline",
    items: [
      { num:"01", title:"Motivation",       sub:"Why computational models?" },
      { num:"02", title:"What is OpenSim?", sub:"Platform & model structure" },
      { num:"03", title:"Core Concepts",    sub:"DOF · Activation · Pipeline" },
      { num:"04", title:"Hands-On Lab",     sub:"Gait2392 & crouch gait" },
      { num:"05", title:"EduExo Lab",       sub:"Simulation meets hardware" }
    ]
  },

  /* ── SECTION ────────────────────────────────────────────────── */
  {
    type:"section", num:"01",
    title:"Motivation",
    sub:"Why do we need computational models?"
  },

  /* ── QUOTE ──────────────────────────────────────────────────── */
  {
    type: "quote",
    tag:  "Motivation",
    text: "Muscles are the engines of the body — but we have never directly observed them at work in vivo.",
    author: "Scott Delp",
    role:   "Professor of Bioengineering, Stanford University"
  },

  /* ── TWO COL ────────────────────────────────────────────────── */
  {
    type:"twocol", tag:"Motivation",
    title:"Why Can't We Just Measure Muscles Directly?",
    left:{
      heading:"The Problem",

    },
    right:{
      heading:"Real-World Questions",
      items:[
        "Why does a patient walk with a crouch gait?",
        "How much does an exoskeleton reduce biceps load?",
        "Which muscles prevent ACL injury during landing?",
        "Should a surgeon lengthen the hamstrings?"
      ]
    }
  },

  /* ── SECTION ────────────────────────────────────────────────── */
  {
    type:"section", num:"02",
    title:"What is OpenSim?",
    sub:"Overview of the platform and model structure"
  },

  /* ── BULLETS ────────────────────────────────────────────────── */
  {
    type:"bullets", tag:"What is OpenSim?",
    title:"What is OpenSim?",
    callout:"\"A free, open-source platform for modeling the musculoskeletal system and simulating human and animal movement.\"",
    items:[

  center:false, transition:'slide',
  width:1280, height:720, margin:0, minScale:0.1, maxScale:2.0,
  keyboard:{
    32:()=>{Reveal.configure({transition:'none'});Reveal.next();setTimeout(()=>Reveal.configure({transition:'slide'}),50)},
    38:()=>{Reveal.configure({transition:'none'});Reveal.prev();setTimeout(()=>Reveal.configure({transition:'slide'}),50)},
    40:()=>{Reveal.configure({transition:'none'});Reveal.next();setTimeout(()=>Reveal.configure({transition:'slide'}),50)}
  }
});

// Scale
let scale=2.5;
const STEP=0.05,MIN=0.8,MAX=2.5;
const flashEl=document.getElementById('flash');
function showFlash(m){flashEl.textContent=m;flashEl.style.opacity='1';clearTimeout(flashEl._t);flashEl._t=setTimeout(()=>{flashEl.style.opacity='0'},1800)}
function applyScale(){document.querySelector('.reveal').style.fontSize=(16*scale)+'px';Reveal.layout();showFlash('Scale: '+Math.round(scale*100)+'%')}

// Page numbers
function updatePageNum(){
  document.querySelectorAll('.page-num').forEach(el=>el.remove());
  const idx=Reveal.getState().indexh+1;
  if(skipIndices.has(idx))return;
  const sec=Reveal.getCurrentSlide();
  if(!sec)return;
  const el=document.createElement('div');
  el.className='page-num';
  el.textContent=idx+' / '+TOTAL;
  sec.appendChild(el);
}
Reveal.on('slidechanged',updatePageNum);
Reveal.on('ready',()=>{applyScale();updatePageNum()});

// Theme
const themes=[{key:'',label:'Academic Slate'},{key:'steel-blue',label:'Steel Blue'},{key:'warm-charcoal',label:'Warm Charcoal'}];
let themeIdx=0;
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT')return;
  if(e.key==='e'||e.key==='E'){scale=Math.min(MAX,+(scale+STEP).toFixed(2));applyScale()}
  if(e.key==='d'||e.key==='D'){scale=Math.max(MIN,+(scale-STEP).toFixed(2));applyScale()}
  if(e.key==='s'||e.key==='S'){themeIdx=(themeIdx+1)%themes.length;document.documentElement.setAttribute('data-theme',themes[themeIdx].key);showFlash('Theme: '+themes[themeIdx].label)}
});
</script>
</body>
</html>
