<body>

<div class="reveal"><div class="slides" id="slide-container"></div></div>

<script>
const SLIDES = [

  /* ── TITLE ── */
  { type:"title", courseCode:"EECE 5552", courseName:"Assistive Robotics",
    title:"Lecture 10: Intro to EMG Signals and Simulation",
    instructor:"Dr. Xian Li", role:"Assistant Teaching Professor",
    dept:"Department of Electrical and Computer Engineering" },

  /* ── AGENDA ── */
  { type:"agenda", tag:"Overview", title:"Lecture Outline",
    items:[
      { num:"01", title:"Clinical Motivation",  sub:"Injury diagnosis & recovery assessment" },
      { num:"02", title:"Muscle Mechanics",      sub:"How muscles generate force" },
      { num:"03", title:"EMG Signals",           sub:"Electrical activity & detection systems" },
      { num:"04", title:"EMG in OpenSim",        sub:"IK, ID, and EMG-informed simulation" },
      { num:"05", title:"Lab Exercise",          sub:"EduExo exoskeleton comparison" }
    ] },

  /* ══ SECTION 01 ══ */
  { type:"section", num:"01", title:"Clinical Motivation",
    sub:"Why does measuring muscles matter in the real world?" },

  { type:"quote", tag:"Clinical Motivation",
    text:"An NBA player lands awkwardly on an inclined surface after a jump. Which muscles were injured — and how do we know?",
    author:"The Central Question",
    role:"Diagnosis · Assessment · Recovery · Prediction" },

  { type:"video", tag:"Clinical Motivation",
    title:"Case Study: Sports Injury & Musculoskeletal Analysis",
    youtube:"jP0IFCHTU3E",
    caption:"Watch how biomechanical tools are applied to real injury scenarios" },


  { type:"pipeline", tag:"Clinical Motivation",
    title:"Step 1 — How Do We Identify Which Muscles Are Injured?",
    steps:[
      { name:"Situational Analysis",
        desc:"Based on the mechanism of injury (e.g. valgus collapse on landing), identify candidate muscles most likely loaded beyond their physiological limit.",
        io:"Input: injury scenario  |  Output: list of candidate muscles" },
      { name:"Functional Movement Tests",
        desc:"Ask the patient to perform specific movements (e.g. single-leg squat, hop test). Observe compensation patterns, range of motion, and pain location.",
        io:"Input: movement tasks  |  Output: performance indicators" },
      { name:"Comparison to Normative Data",
        desc:"Compare the patient's joint angles, forces, and muscle activity to a healthy population baseline to quantify the deficit.",
        io:"Input: patient data  |  Output: deviation from norm (% deficit)" }
    ] },

  { type:"twocol", tag:"Clinical Motivation",
    title:"Step 2 — Assessing Recovery: How Close to Normal?",
    left:{ heading:"Motion Capture Approach", items:[
      "Attach reflective markers to bony landmarks",
      "Capture 3D joint trajectories during functional tasks",
      "Run Inverse Kinematics → joint angle time series",
      "Run Inverse Dynamics → net joint moments",
      "Run Static Optimization → per-muscle activation"
    ]},
    right:{ heading:"Comparison to Normative Data", items:[
      "Match subject to age/sex/mass-matched healthy controls",
      "Compute symmetry index between injured and healthy limb",
      "Plot muscle activation envelopes side by side",
      "Flag muscles with activation deficit > 15%",
      "Track improvement across rehabilitation sessions"
    ]},
    callout:"This is exactly the OpenSim pipeline from Lecture 9 — now applied to a clinical rehabilitation question." },

  { type:"flow", tag:"Clinical Motivation",
    title:"Step 3 — Predicting Which Exercises Aid Recovery",
    steps:[
      { label:"Build Patient Model",  sub:"Scale OpenSim model to subject" },
      { label:"Simulate Exercise",    sub:"Prescribe candidate movements" },
      { label:"Predict Muscle Load",  sub:"Static Optimization output" },
      { label:"Compare & Select",     sub:"Pick exercises targeting deficit muscles" }
    ],
    callout:"Simulation lets clinicians test dozens of exercise variants <em>before</em> asking the patient to perform them — reducing risk and saving time." },

  /* ══ SECTION 02 ══ */
  { type:"section", num:"02", title:"Muscle Mechanics",
    sub:"How muscles generate, transmit, and limit force" },

  { type:"image", tag:"Muscle Mechanics",
    title:"Muscle Structure: From Organ to Sarcomere",
    src:"img/muscle_fiber_anatomy.png",
    caption:"Hierarchical organization: whole muscle → fascicle → fiber → myofibril → sarcomere. The sarcomere is the basic contractile unit." },

  { type:"definition", tag:"Muscle Mechanics", term:"Skeletal Muscle",
    def:"A skeletal muscle is a voluntary, striated tissue composed of bundled muscle fibers (fascicles). Each fiber contains sarcomeres — the fundamental contractile units — arranged in series and parallel. When activated by a motor neuron, cross-bridges form between actin and myosin filaments, generating active force. Passive elastic elements in the connective tissue contribute additional force at longer lengths.",
    source:"Zajac, 1989 — Critical Reviews in Biomedical Engineering" },

  { type:"image", tag:"Muscle Mechanics",
    title:"Hill-Type Muscle Model — 3-Element Schematic",
    src:"img/hill_model_diagram.png",
    caption:"CE = contractile element (active force), SEE = series elastic (tendon), PEE = parallel elastic (connective tissue). CC BY-SA 3.0, Wikimedia Commons." },

  { type:"equation", tag:"Muscle Mechanics",
    title:"Hill-Type Muscle Model",
    eq:`$$F_m(t) = a(t) \\cdot F_{max} \\cdot \\tilde{F}_L(\\ell) \\cdot \\tilde{F}_V(v) + F_P(\\ell)$$`,
    terms:[
      { sym:`$a(t)$`,                 meaning:"Activation (0–1) — driven by neural input or EMG" },
      { sym:`$F_{max}$`,              meaning:"Maximum isometric force of the muscle" },
      { sym:`$\\tilde{F}_L(\\ell)$`,  meaning:"Normalized force-length curve" },
      { sym:`$\\tilde{F}_V(v)$`,      meaning:"Normalized force-velocity curve" },
      { sym:`$F_P(\\ell)$`,           meaning:"Passive elastic force (connective tissue)" }
    ],
    callout:"Key insight: $a(t)$ is the only term directly observable from surface EMG. The rest comes from the model geometry." },

  { type:"twocol", tag:"Muscle Mechanics",
    title:"Force-Length and Force-Velocity Relationships",
    left:{ heading:"Force-Length $\\tilde{F}_L(\\ell)$", items:[
      "Peak force occurs at optimal fiber length $\\ell_0$",
      "Force drops at shorter lengths — overlap reduced",
      "Force drops at longer lengths — fewer cross-bridges",
      "Determines joint angle at which muscle is strongest",
      "Clinically: why muscle length matters in posture"
    ]},
    right:{ heading:"Force-Velocity $\\tilde{F}_V(v)$", items:[
      "Isometric ($v=0$): maximum active force",
      "Concentric ($v>0$, shortening): force decreases",
      "Eccentric ($v<0$, lengthening): force can exceed $F_{max}$",
      "Eccentric contractions are the primary cause of DOMS",
      "NBA landing = high eccentric load on quadriceps"
    ]},
    callout:"Injury risk is highest during <strong>rapid eccentric contractions</strong> at long muscle lengths — exactly what happens during a hard landing." },

  /* ══ SECTION 03 ══ */
  { type:"section", num:"03", title:"EMG Signals",
    sub:"Measuring the electrical activity of muscles" },

  { type:"definition", tag:"EMG Signals", term:"Electromyography (EMG)",
    def:"Electromyography is the measurement of the electrical potentials generated by muscle fibers during contraction. When a motor neuron fires, it triggers an action potential that propagates along the muscle fiber membrane, producing a detectable voltage difference. The sum of all active motor unit action potentials (MUAPs) in the pickup volume is recorded as the raw EMG signal.",
    source:"De Luca, 1979 — CRC Critical Reviews in Biomedical Engineering" },

  { type:"image", tag:"EMG Signals",
    title:"EMG in Practice: Clinical and Wearable Applications",
    src:"img/emg_applications.png",
    caption:"EMG is used across prosthetics, rehabilitation, sports science, and human-robot interaction — the same signal pipeline applies in each domain." },

  { type:"image", tag:"EMG Signals",
    title:"Surface EMG Electrode Placement Guide",
    src:"img/electrode_placement.png",
    caption:"Proper electrode placement is critical — misplacement by 1 cm can reduce signal amplitude by 50%." },

  { type:"pipeline", tag:"EMG Signals",
    title:"From Muscle Activation to Processed EMG",
    steps:[
      { name:"Motor Unit Recruitment",
        desc:"Central nervous system recruits motor units. Each firing produces a motor unit action potential (MUAP) measured in microvolts (μV).",
        io:"Neural drive → MUAPs (10–500 μV, 10–500 Hz)" },
      { name:"Signal Acquisition",

    code:
`import pandas as pd

# Load MyoWare data exported from Arduino Serial Monitor
# Columns: time_ms, raw_emg_mV
emg = pd.read_csv("myoware_session.csv")
emg["time_s"] = emg["time_ms"] / 1000.0

# Normalize to MVC (record a separate MVC trial first)
mvc_value = emg["raw_emg_mV"].max()   # or load from MVC trial file
emg["activation"] = emg["raw_emg_mV"] / mvc_value
emg["activation"] = emg["activation"].clip(0, 1)  # clamp to [0, 1]

# Write as OpenSim .sto activation file
with open("myoware_activations.sto", "w") as f:
    f.write("Activations\\n")
    f.write(f"nRows={len(emg)}\\nnColumns=2\\n")
    f.write("inDegrees=no\\n\\nendheader\\ntime\\tBIClong\\n")
    for _, row in emg.iterrows():
        f.write(f"{row.time_s:.4f}\\t{row.activation:.6f}\\n")

print("Saved: myoware_activations.sto")`

const SEAL=`<img class="nu-seal" src="https://upload.wikimedia.org/wikipedia/commons/b/bb/NU_RGB_seal_R.png" alt="">`;
const SKIP_TYPES=new Set(["title","section","qa"]);

function render(s){
  switch(s.type){
    case "title":{const d=new Date();const ds=s.date||`${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}/${d.getFullYear()}`;return `<section class="slide-dark is-title">${SEAL}<div class="title-course-label">${s.courseCode}</div><div class="title-course-name">${s.courseName}</div><div class="title-h1">${s.title.replace(/\n/g,'<br>')}</div><div class="title-instructor-name">${s.instructor}</div><div class="title-instructor-sub">${s.role}<br>${s.dept}<br>${ds}</div></section>`;}
    case "section":return `<section class="slide-dark is-section"><div class="section-number">${s.num}</div>${SEAL}<h2>${s.title}</h2><p class="section-sub">${s.sub}</p></section>`;
    case "qa":return `<section class="slide-dark is-qa">${SEAL}<h2>Q &amp; A</h2><p class="section-sub">Questions &amp; Discussion</p><p class="qa-sub">${s.courseCode} · ${s.courseName} &nbsp;·&nbsp; ${s.university}</p></section>`;
    case "agenda":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2><div class="agenda-grid">${s.items.map(i=>`<div class="agenda-item"><div class="agenda-num">${i.num}</div><div><div class="agenda-title">${i.title}</div>${i.sub?`<div class="agenda-sub">${i.sub}</div>`:''}</div></div>`).join('')}</div></section>`;
    case "definition":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title||s.term}</h2><div class="def-term">${s.term}</div><div class="def-text">${s.def}</div>${s.source?`<div class="def-source">Source: ${s.source}</div>`:''}</section>`;
    case "quote":return `<section>${s.tag?`<div class="course-tag">${s.tag}</div>`:''}<div class="quote-wrap"><div class="quote-mark">"</div><div class="quote-text">${s.text}</div><div class="quote-author">${s.author}</div>${s.role?`<div class="quote-role">${s.role}</div>`:''}</div></section>`;
    case "twocol":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2><div class="two-col"><div class="col-box"><h3>${s.left.heading}</h3><ul>${s.left.items.map(i=>`<li>${i}</li>`).join('')}</ul></div><div class="col-box"><h3>${s.right.heading}</h3><ul>${s.right.items.map(i=>`<li>${i}</li>`).join('')}</ul></div></div>${s.callout?`<div class="callout">${s.callout}</div>`:''}</section>`;
    case "comparison":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2><div class="compare-wrap"><div class="compare-box"><div class="compare-label muted">${s.left.label}</div><ul>${s.left.items.map(i=>`<li>${i}</li>`).join('')}</ul></div><div class="compare-divider">vs</div><div class="compare-box right"><div class="compare-label">${s.right.label}</div><ul>${s.right.items.map(i=>`<li>${i}</li>`).join('')}</ul></div></div>${s.callout?`<div class="callout">${s.callout}</div>`:''}</section>`;
    case "flow":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2><div class="flow-row">${s.steps.map((st,i)=>`<div class="flow-step"><div class="step-num">${i+1}</div><div class="step-label">${st.label}</div><div class="step-sub">${st.sub}</div></div>${i<s.steps.length-1?'<div class="flow-arrow">&#8594;</div>':''}`).join('')}</div>${s.callout?`<div class="callout">${s.callout}</div>`:''}</section>`;
    case "pipeline":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2>${s.steps.map((st,i)=>`<div class="pipeline-row"><div class="pipe-num">${i+1}</div><div><div class="pipe-name">${st.name}</div><div class="pipe-desc">${st.desc}</div><div class="pipe-io">${st.io.replace('|','&nbsp;|&nbsp;')}</div></div></div>`).join('')}</section>`;
    case "compgrid":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2><div class="comp-grid">${s.cards.map(c=>`<div class="comp-card" ${c.highlight?'style="background:var(--callout-bg);border-color:var(--callout-border);"':''}><div class="comp-label">${c.label}</div><div class="comp-name">${c.name}</div><div class="comp-desc">${c.desc}</div></div>`).join('')}</div></section>`;
    case "table":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2><table class="map-table"><thead><tr>${s.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${s.rows.map(r=>`<tr>${r.map((c,i)=>`<td ${i===s.accentCol?'class="col-accent"':''}>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>${s.callout?`<div class="callout">${s.callout}</div>`:''}</section>`;
    case "equation":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2><div class="eq-display katex-render">${s.eq}</div>${s.terms?`<div class="eq-terms">${s.terms.map(t=>`<div class="eq-term"><span class="eq-sym katex-render">${t.sym}</span><span class="eq-meaning">${t.meaning}</span></div>`).join('')}</div>`:''} ${s.callout?`<div class="callout">${s.callout}</div>`:''}</section>`;
    case "code":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2>${s.callout?`<div class="callout" style="margin-bottom:10px;">${s.callout}</div>`:''}<div class="code-wrap"><div class="code-lang-bar">${s.language||'code'}</div><pre class="code-block">${s.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre></div></section>`;
    case "image":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2><div class="img-wrap"><img src="${s.src}" alt="${s.title}"><div class="img-caption">${s.caption||''}</div></div></section>`;
    case "video":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2><div class="video-wrap"><iframe src="https://www.youtube.com/embed/${s.youtube}?rel=0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>${s.caption?`<div class="video-caption">${s.caption}</div>`:''}</section>`;
    case "lab":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2><div class="two-col"><div><h3>Steps</h3>${s.steps.map((st,i)=>`<div class="lab-step"><div class="lab-n">${i+1}</div><div class="lab-text">${st}</div></div>`).join('')}</div><div class="col-box"><h3>Discussion Questions</h3><ul>${s.questions.map(q=>`<li>${q}</li>`).join('')}</ul></div></div></section>`;
    case "summary":return `<section><div class="course-tag">${s.tag}</div><h2>${s.title}</h2><div class="summary-grid">${s.items.map((item,i)=>`<div class="sum-item"><div class="badge">${i+1}</div>${item}</div>`).join('')}</div><div class="next-box"><strong>Next class:</strong> ${s.next}</div><div class="resource-links">${s.links.map(l=>`<a class="res-link" href="${l.url}" target="_blank">${l.label}</a>`).join('')}</div></section>`;
    default:return `<section><p style="color:red;">Unknown type: "${s.type}"</p></section>`;
  }
}

function renderMath(){

  renderMathInElement(document.getElementById('slide-container'),{
    delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],

  });
}

Reveal.initialize({
  hash:true,slideNumber:false,controls:true,progress:true,
  center:false,transition:'slide',
  width:1280,height:720,margin:0,minScale:0.1,maxScale:2.0,
  keyboard:{
    32:()=>{Reveal.configure({transition:'none'});Reveal.next();setTimeout(()=>Reveal.configure({transition:'slide'}),50)},
    38:()=>{Reveal.configure({transition:'none'});Reveal.prev();setTimeout(()=>Reveal.configure({transition:'slide'}),50)},
    40:()=>{Reveal.configure({transition:'none'});Reveal.next();setTimeout(()=>Reveal.configure({transition:'slide'}),50)}
  }
});

let scale=1.75;
const STEP=0.05,MIN=0.8,MAX=2.5;
const flashEl=document.getElementById('flash');
function showFlash(m){flashEl.textContent=m;flashEl.style.opacity='1';clearTimeout(flashEl._t);flashEl._t=setTimeout(()=>{flashEl.style.opacity='0'},1800)}
function applyScale(){document.querySelector('.reveal').style.fontSize=(16*scale)+'px';Reveal.layout();showFlash('Scale: '+Math.round(scale*100)+'%')}
function updatePageNum(){
  document.querySelectorAll('.page-num').forEach(el=>el.remove());
  const idx=Reveal.getState().indexh+1;
  if(skipIndices.has(idx))return;
  const sec=Reveal.getCurrentSlide();if(!sec)return;
  const el=document.createElement('div');el.className='page-num';
  el.textContent=idx+' / '+TOTAL;sec.appendChild(el);
}
Reveal.on('slidechanged',updatePageNum);
Reveal.on('ready',()=>{applyScale();updatePageNum()});
const themes=[{key:'',label:'Academic Slate'},{key:'steel-blue',label:'Steel Blue'},{key:'warm-charcoal',label:'Warm Charcoal'}];
let themeIdx=0;
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT')return;
  if(e.key==='e'||e.key==='E'){scale=Math.min(MAX,+(scale+STEP).toFixed(2));applyScale()}
  if(e.key==='d'||e.key==='D'){scale=Math.max(MIN,+(scale-STEP).toFixed(2));applyScale()}
  if(e.key==='s'||e.key==='S'){themeIdx=(themeIdx+1)%themes.length;document.documentElement.setAttribute('data-theme',themes[themeIdx].key);showFlash('Theme: '+themes[themeIdx].label)}
});
</script>
